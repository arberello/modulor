name: Keepalive Supabase

# Evita la pausa del progetto Supabase (free tier) dopo 7 giorni di inattività:
# ogni giorno fa una richiesta leggera che tocca il DB.

on:
  schedule:
    - cron: "17 6 * * *" # ogni giorno alle 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          URL="${{ vars.MODULOR_URL }}"
          if [ -z "$URL" ]; then
            echo "Imposta la variabile repo MODULOR_URL (Settings → Secrets and variables → Actions → Variables), es. https://modulor.vercel.app"
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
          echo "Health status: $code"
          test "$code" = "200"
